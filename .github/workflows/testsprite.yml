name: StatusPulse — TestSprite Verification

on:
  pull_request:
  push:
    branches: [main]

jobs:
  testsprite:
    runs-on: ubuntu-latest
    env:
      TESTSPRITE_API_KEY: ${{ secrets.TESTSPRITE_API_KEY }}
      PROJECT_ID: dc688ee6-3d53-4cd9-a8a2-21229ef20a01

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install TestSprite CLI
        run: npm install -g @testsprite/testsprite-cli

      - name: Run all tests
        id: testsprite
        run: |
          testsprite test run --all --project "$PROJECT_ID" --wait --output json > result.json
          echo "status=$(jq -r '.run.status' result.json)" >> $GITHUB_OUTPUT

      - name: Download failure artifacts
        if: failure()
        run: |
          TEST_ID=$(jq -r '.run.testId' result.json)
          testsprite test failure get "$TEST_ID" --out ./.testsprite/failure

      - name: Upload failure bundle
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: testsprite-failure
          path: ./.testsprite/failure

      - name: Summary
        run: |
          echo "### TestSprite Results" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** $(jq -r '.run.status' result.json)" >> $GITHUB_STEP_SUMMARY
          echo "**Dashboard:** https://www.testsprite.com/dashboard/tests/$PROJECT_ID" >> $GITHUB_STEP_SUMMARY
