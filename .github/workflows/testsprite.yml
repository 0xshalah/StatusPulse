name: StatusPulse — TestSprite Verification

on:
  pull_request:
  push:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run unit tests (Vitest)
        run: npx vitest run

  backend-security:
    needs: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests

      - name: Backend auth / guardrail / validation boundaries (live app)
        env:
          STATUSPULSE_URL: https://statuspulse.edgeone.dev
        run: python .testsprite/backend_security.py

  testsprite:
    needs: [unit, backend-security]
    runs-on: ubuntu-latest
    env:
      TESTSPRITE_API_KEY: ${{ secrets.TESTSPRITE_API_KEY }}
      PROJECT_ID: dc688ee6-3d53-4cd9-a8a2-21229ef20a01

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install TestSprite CLI
        run: npm install -g @testsprite/testsprite-cli

      - name: Run all tests
        id: testsprite
        run: |
          testsprite test run --all --project "$PROJECT_ID" --wait --output json > result.json
          echo "status=$(jq -r '.run.status' result.json)" >> $GITHUB_OUTPUT

      - name: Download failure artifacts
        if: failure()
        run: |
          TEST_ID=$(jq -r '.run.testId' result.json)
          testsprite test failure get "$TEST_ID" --out ./.testsprite/failure

      - name: Upload failure bundle
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: testsprite-failure
          path: ./.testsprite/failure

      - name: Summary
        run: |
          echo "### TestSprite Results" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** $(jq -r '.run.status' result.json)" >> $GITHUB_STEP_SUMMARY
          echo "**Dashboard:** https://www.testsprite.com/dashboard/tests/$PROJECT_ID" >> $GITHUB_STEP_SUMMARY
